<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Follower Robot</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin-bottom: 10px;
            color: #111;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .video-wrapper {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background-color: #000; /* Prevents layout flash before video loads */
        }

        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Line Follower Robot</h1>
        <p>A demonstration of the autonomous robot navigating a path using infrared sensors.</p>
        
        <div class="video-wrapper">
            <video controls playsinline preload="metadata">
                <source src="robot_following_line.mov" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

</body>
</html>
