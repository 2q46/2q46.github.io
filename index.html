
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Follower Robot</title>
    <style>
        /* Global Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Card Container */
        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 90%;
            text-align: center;
            border-top: 5px solid #007aff; /* Accent color */
        }

        /* Typography */
        h1 {
            color: #1d1d1f;
            margin-top: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            color: #6e6e73;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        /* Button / Link Style */
        .btn {
            display: inline-block;
            background-color: #007aff;
            color: #ffffff;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Line Follower Robot</h1>
        <p>Welcome to our webpage detailing the design, builds, and logic behind our autonomous line follower robot.</p>
        <a href="https://github.com/2q46/2q46.github.io" class="btn">View Source Code</a>
